# Builds and publishes a release when you push a version tag (e.g., v1.0.0)
#
# SETUP REQUIRED:
# 1. Go to GitHub repo → Settings → Secrets and variables → Actions
# 2. Add these repository secrets:
#    - WEBHOOK_URL: Your Google Apps Script deployment URL
#    - WEBHOOK_SECRET: Your HMAC secret UUID (must match Apps Script)
#
# To create a release:
#   git tag v1.0.1
#   git push origin v1.0.1

name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Inject secrets into WPF source
        run: |
          $file = "WPF/MainWindow.xaml.cs"
          $content = Get-Content $file -Raw
          $content = $content -replace '\{\{WEBHOOK_URL\}\}', '${{ secrets.WEBHOOK_URL }}'
          $content = $content -replace '\{\{WEBHOOK_SECRET\}\}', '${{ secrets.WEBHOOK_SECRET }}'
          Set-Content $file $content
          Write-Host "Secrets injected into WPF source"
        shell: pwsh

      - name: Inject secrets into PowerShell script
        run: |
          $file = "FieldPulse-SIP-Readiness.ps1"
          $content = Get-Content $file -Raw
          $content = $content -replace '\{\{WEBHOOK_URL\}\}', '${{ secrets.WEBHOOK_URL }}'
          $content = $content -replace '\{\{WEBHOOK_SECRET\}\}', '${{ secrets.WEBHOOK_SECRET }}'
          Set-Content $file $content
          Write-Host "Secrets injected into PowerShell script"
        shell: pwsh

      - name: Install wkhtmltopdf for PDF generation
        run: choco install wkhtmltopdf -y --no-progress
        shell: pwsh

      - name: Generate PDFs and embed in WPF project
        run: |
          # Add wkhtmltopdf to PATH
          $env:PATH += ";C:\Program Files\wkhtmltopdf\bin"

          # Create WPF/Docs folder for embedded resources
          New-Item -ItemType Directory -Path "WPF/Docs" -Force

          # Convert USER-GUIDE.md to PDF (embedded in EXE)
          pandoc USER-GUIDE.md -o "WPF/Docs/USER-GUIDE.pdf" `
            --pdf-engine=wkhtmltopdf `
            --metadata title="FieldPulse SIP Readiness - User Guide" `
            -V margin-top=20mm -V margin-bottom=20mm -V margin-left=20mm -V margin-right=20mm

          # Convert IT-ADMIN-GUIDE.md to PDF (embedded in EXE)
          pandoc IT-ADMIN-GUIDE.md -o "WPF/Docs/IT-ADMIN-GUIDE.pdf" `
            --pdf-engine=wkhtmltopdf `
            --metadata title="FieldPulse SIP Readiness - IT Admin Guide" `
            -V margin-top=20mm -V margin-bottom=20mm -V margin-left=20mm -V margin-right=20mm

          Write-Host "PDFs generated for embedding:"
          Get-ChildItem WPF/Docs/*.pdf
        shell: pwsh

      - name: Build WPF Application (with embedded PDFs)
        run: |
          cd WPF
          dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ../Deploy

      - name: Copy PDFs to Deploy folder for separate download
        run: |
          Copy-Item "WPF/Docs/USER-GUIDE.pdf" Deploy/
          Copy-Item "WPF/Docs/IT-ADMIN-GUIDE.pdf" Deploy/
          Write-Host "PDFs copied to Deploy folder"
        shell: pwsh

      - name: Create README.txt for deployment
        run: |
          @"
          ================================================================================
            FIELDPULSE SIP READINESS CHECK  -  ${{ github.ref_name }}
            Quick Start Guide
          ================================================================================

          HOW TO RUN
          ----------
          1. Double-click "FieldPulse-SIP-Readiness.exe"
          2. If SmartScreen appears, click "More info" then "Run anyway"
          3. Enter your company name
          4. Click "Run Checks"
          5. Review results, then click "Send to FieldPulse"

          DOCUMENTATION
          -------------
          - USER-GUIDE.pdf       Full guide for end users (non-technical)
          - IT-ADMIN-GUIDE.pdf   Firewall and network requirements for IT teams

          TIP: Click "User Guide" or "IT Admin Guide" buttons in the app to open docs.

          NEED HELP?
          ----------
          Contact support@fieldpulse.com

          ================================================================================
          "@ | Out-File -FilePath Deploy/README.txt -Encoding UTF8
        shell: pwsh

      - name: Create release zip
        run: Compress-Archive -Path Deploy/* -DestinationPath FieldPulse-SIP-Readiness-${{ github.ref_name }}.zip
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: FieldPulse SIP Readiness ${{ github.ref_name }}
          body: |
            ## FieldPulse SIP Readiness Check ${{ github.ref_name }}

            ### Quick Download
            | File | Description |
            |------|-------------|
            | **[FieldPulse-SIP-Readiness.exe](https://github.com/Deltronzero2020/FieldPulse-SIP-Readiness/releases/download/${{ github.ref_name }}/FieldPulse-SIP-Readiness.exe)** | Application — just download and run! |
            | **[USER-GUIDE.pdf](https://github.com/Deltronzero2020/FieldPulse-SIP-Readiness/releases/download/${{ github.ref_name }}/USER-GUIDE.pdf)** | Step-by-step guide for end users |
            | **[IT-ADMIN-GUIDE.pdf](https://github.com/Deltronzero2020/FieldPulse-SIP-Readiness/releases/download/${{ github.ref_name }}/IT-ADMIN-GUIDE.pdf)** | Firewall/network requirements for IT teams |

            ### Full Package
            Download **[FieldPulse-SIP-Readiness-${{ github.ref_name }}.zip](https://github.com/Deltronzero2020/FieldPulse-SIP-Readiness/releases/download/${{ github.ref_name }}/FieldPulse-SIP-Readiness-${{ github.ref_name }}.zip)** for everything bundled together.

            ### Requirements
            - Windows 10 or Windows 11 (x64)
            - Internet connection
            - No administrator rights required

            ### What's New
            - **User Guide** and **IT Admin Guide** buttons open built-in PDF documentation
            - PDFs are embedded in the EXE — no separate downloads needed
            - PDFs also available as separate downloads above
          files: |
            Deploy/FieldPulse-SIP-Readiness.exe
            Deploy/USER-GUIDE.pdf
            Deploy/IT-ADMIN-GUIDE.pdf
            FieldPulse-SIP-Readiness-${{ github.ref_name }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
