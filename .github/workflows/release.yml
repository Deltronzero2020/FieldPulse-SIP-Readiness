# Builds and publishes a release when you push a version tag (e.g., v1.0.0)
#
# SETUP REQUIRED:
# 1. Go to GitHub repo → Settings → Secrets and variables → Actions
# 2. Add these repository secrets:
#    - WEBHOOK_URL: Your Google Apps Script deployment URL
#    - WEBHOOK_SECRET: Your HMAC secret UUID (must match Apps Script)
#
# To create a release:
#   git tag v1.0.1
#   git push origin v1.0.1

name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Inject secrets into WPF source
        run: |
          $file = "WPF/MainWindow.xaml.cs"
          $content = Get-Content $file -Raw
          $content = $content -replace '\{\{WEBHOOK_URL\}\}', '${{ secrets.WEBHOOK_URL }}'
          $content = $content -replace '\{\{WEBHOOK_SECRET\}\}', '${{ secrets.WEBHOOK_SECRET }}'
          Set-Content $file $content
          Write-Host "Secrets injected into WPF source"
        shell: pwsh

      - name: Inject secrets into PowerShell script
        run: |
          $file = "FieldPulse-SIP-Readiness.ps1"
          $content = Get-Content $file -Raw
          $content = $content -replace '\{\{WEBHOOK_URL\}\}', '${{ secrets.WEBHOOK_URL }}'
          $content = $content -replace '\{\{WEBHOOK_SECRET\}\}', '${{ secrets.WEBHOOK_SECRET }}'
          Set-Content $file $content
          Write-Host "Secrets injected into PowerShell script"
        shell: pwsh

      - name: Build WPF Application
        run: |
          cd WPF
          dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ../Deploy

      - name: Add documentation to Deploy folder
        run: |
          Copy-Item USER-GUIDE.md Deploy/
          Copy-Item IT-ADMIN-GUIDE.md Deploy/
        shell: pwsh

      - name: Create README.txt for deployment
        run: |
          @"
          ================================================================================
            FIELDPULSE SIP READINESS CHECK  -  ${{ github.ref_name }}
            Quick Start Guide
          ================================================================================

          HOW TO RUN
          ----------
          1. Double-click "FieldPulse-SIP-Readiness.exe"
          2. If SmartScreen appears, click "More info" then "Run anyway"
          3. Enter your company name
          4. Click "Run Checks"
          5. Review results, then click "Send to FieldPulse"

          DOCUMENTATION
          -------------
          - USER-GUIDE.md      Full guide for end users (non-technical)
          - IT-ADMIN-GUIDE.md  Firewall and network requirements for IT teams

          NEED HELP?
          ----------
          Contact support@fieldpulse.com

          ================================================================================
          "@ | Out-File -FilePath Deploy/README.txt -Encoding UTF8
        shell: pwsh

      - name: Create release zip
        run: Compress-Archive -Path Deploy/* -DestinationPath FieldPulse-SIP-Readiness-${{ github.ref_name }}.zip
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: FieldPulse SIP Readiness ${{ github.ref_name }}
          body: |
            ## FieldPulse SIP Readiness Check ${{ github.ref_name }}

            ### Download
            Download `FieldPulse-SIP-Readiness-${{ github.ref_name }}.zip`, extract, and run the EXE.

            ### What's Included
            - `FieldPulse-SIP-Readiness.exe` — Single-file application (no install needed)
            - `USER-GUIDE.md` — Step-by-step guide for end users
            - `IT-ADMIN-GUIDE.md` — Firewall/network requirements for IT teams
            - `README.txt` — Quick start instructions

            ### Requirements
            - Windows 10 or Windows 11 (x64)
            - Internet connection
            - No administrator rights required
          files: FieldPulse-SIP-Readiness-${{ github.ref_name }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
